<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="InvestTracker">
<title>InvestTracker</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text',sans-serif;background:#f2f2f7;color:#1c1c1e;max-width:430px;margin:0 auto;min-height:100vh}
:root{--blue:#007aff;--green:#34c759;--red:#ff3b30;--gray:#8e8e93;--card:#fff;--border:#e5e5ea}
.header{background:rgba(255,255,255,0.95);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);padding:52px 20px 10px;position:sticky;top:0;z-index:100;border-bottom:1px solid var(--border)}
.header h1{font-size:24px;font-weight:700;display:flex;align-items:center;gap:8px}
.sub{font-size:11px;color:var(--gray);margin-top:1px}
.tabs{display:flex;background:#e5e5ea;border-radius:10px;padding:2px;margin:10px 0 0}
.tab{flex:1;padding:7px 0;border:none;background:transparent;border-radius:8px;font-size:13px;font-weight:500;color:var(--gray);cursor:pointer;transition:all .2s}
.tab.active{background:#fff;color:#1c1c1e;box-shadow:0 1px 4px rgba(0,0,0,.12)}
.summary{display:flex;gap:9px;padding:13px 20px;overflow-x:auto;scrollbar-width:none}
.summary::-webkit-scrollbar{display:none}
.scard{min-width:112px;background:var(--card);border-radius:14px;padding:11px 12px;box-shadow:0 1px 3px rgba(0,0,0,.08);flex-shrink:0}
.scard .lbl{font-size:10px;color:var(--gray);font-weight:600;text-transform:uppercase;letter-spacing:.4px}
.scard .val{font-size:17px;font-weight:700;margin-top:3px}
.val.pos{color:var(--green)}.val.neg{color:var(--red)}
.filter-bar{display:flex;gap:7px;padding:0 20px 11px;overflow-x:auto;scrollbar-width:none}
.filter-bar::-webkit-scrollbar{display:none}
.chip{padding:5px 13px;border-radius:20px;border:1.5px solid var(--border);background:#fff;font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap;color:#3a3a3c}
.chip.on{background:var(--blue);color:#fff;border-color:var(--blue)}
.section{padding:0 20px 100px}
.sec-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.sec-ttl{font-size:19px;font-weight:700}
.btn{background:var(--blue);color:#fff;border:none;border-radius:10px;padding:8px 16px;font-size:14px;font-weight:600;cursor:pointer;transition:opacity .2s}
.btn:active{opacity:.75}
.btn.sm{padding:5px 12px;font-size:12px;border-radius:8px}
.btn.out{background:transparent;color:var(--blue);border:1.5px solid var(--blue)}
.btn.red{background:var(--red)}.btn.grn{background:var(--green)}
.btn.raf{background:linear-gradient(135deg,#007aff,#5856d6);display:flex;align-items:center;gap:5px;font-size:13px;padding:8px 14px}
.btn:disabled{opacity:.45;cursor:not-allowed}
.card{background:var(--card);border-radius:16px;padding:15px;margin-bottom:12px;box-shadow:0 1px 3px rgba(0,0,0,.08)}
.inv-top{display:flex;justify-content:space-between;align-items:flex-start;gap:8px}
.inv-meta{flex:1;min-width:0}
.inv-name{font-size:15px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.inv-tkr{font-size:11px;color:var(--gray);margin-top:1px}
.badges{display:flex;gap:4px;flex-wrap:wrap;margin-top:5px}
.badge{font-size:10px;font-weight:600;padding:2px 7px;border-radius:20px;background:#e5e5ea;color:#3a3a3c}
.badge.usd{background:#dbeafe;color:#1d4ed8}.badge.sgd{background:#dcfce7;color:#15803d}
.badge.gbp{background:#f3e8ff;color:#7e22ce}.badge.eur{background:#fff7ed;color:#c2410c}
.badge.hkd{background:#fef9c3;color:#a16207}
.badge.cash{background:#dcfce7;color:#166534}.badge.srs{background:#fef9c3;color:#854d0e}.badge.cpf{background:#fce7f3;color:#9d174d}
.price-box{text-align:right;min-width:115px;flex-shrink:0}
.price-lbl{font-size:10px;color:var(--gray);margin-bottom:3px;display:flex;align-items:center;justify-content:flex-end;gap:4px}
.price-big{font-size:19px;font-weight:700}
.price-chg{font-size:11px;font-weight:600;margin-top:1px}
.price-ts{font-size:9px;color:var(--gray);margin-top:2px}
.abadge{font-size:9px;background:#dcfce7;color:#15803d;padding:1px 5px;border-radius:6px;font-weight:700}
.mbadge{font-size:9px;background:#f2f2f7;color:var(--gray);padding:1px 5px;border-radius:6px;font-weight:700}
.spin{display:inline-block;width:11px;height:11px;border:2px solid #e5e5ea;border-top-color:var(--blue);border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle}
@keyframes spin{to{transform:rotate(360deg)}}
.manual-row{display:flex;align-items:center;gap:4px;justify-content:flex-end;margin-top:5px}
.spot-inp{width:88px;border:1.5px solid var(--border);border-radius:8px;padding:5px 8px;font-size:13px;text-align:right;background:#f9f9f9}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-top:11px}
.stat{background:#f2f2f7;border-radius:10px;padding:9px 10px}
.stat .sl{font-size:9px;color:var(--gray);font-weight:600;text-transform:uppercase;letter-spacing:.3px}
.stat .sv{font-size:13px;font-weight:700;margin-top:2px}
.actions{display:flex;gap:7px;margin-top:11px;flex-wrap:wrap}
.tx-hdr{font-size:11px;font-weight:700;color:var(--gray);margin:10px 0 4px;text-transform:uppercase;letter-spacing:.3px}
.tx-item{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border);font-size:12px}
.tx-item:last-child{border-bottom:none}
.tx-t{font-weight:700}
.tx-t.buy{color:var(--blue)}.tx-t.sell{color:var(--red)}.tx-t.rights{color:#ff9500}.tx-t.free{color:var(--green)}
/* Modal */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;display:flex;align-items:flex-end;justify-content:center}
.modal{background:#fff;border-radius:22px 22px 0 0;padding:22px 20px 44px;width:100%;max-width:430px;max-height:90vh;overflow-y:auto}
.modal h2{font-size:19px;font-weight:700;margin-bottom:16px}
.fg{margin-bottom:12px;position:relative}
.fg label{font-size:12px;font-weight:600;color:#444;display:block;margin-bottom:4px}
.fg input,.fg select{width:100%;padding:11px 13px;border:1.5px solid var(--border);border-radius:11px;font-size:15px;background:#fff;-webkit-appearance:none;appearance:none}
.fg input:focus,.fg select:focus{outline:none;border-color:var(--blue)}
.fg .hint{font-size:11px;color:var(--gray);margin-top:3px}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:9px}
.m-actions{display:flex;gap:9px;margin-top:18px}
.m-actions .btn{flex:1;padding:13px}
/* Autocomplete dropdown */
.ac-drop{position:absolute;left:0;right:0;top:calc(100% - 2px);background:#fff;border:1.5px solid var(--blue);border-top:none;border-radius:0 0 11px 11px;z-index:50;max-height:200px;overflow-y:auto;box-shadow:0 8px 20px rgba(0,0,0,.12)}
.ac-item{padding:11px 13px;font-size:13px;cursor:pointer;border-bottom:1px solid var(--border);display:flex;flex-direction:column;gap:2px}
.ac-item:last-child{border-bottom:none}
.ac-item:active,.ac-item:hover{background:#f0f7ff}
.ac-sym{font-weight:700;color:var(--blue);font-size:12px}
.ac-name{color:#1c1c1e;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ac-ex{font-size:10px;color:var(--gray)}
.ac-loading{padding:14px;text-align:center;color:var(--gray);font-size:13px}
/* Dividend */
.div-tbl{background:var(--card);border-radius:14px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.08);margin-bottom:14px}
.dthr{display:grid;grid-template-columns:2fr 1fr 1.2fr 1fr;gap:4px;padding:9px 12px;background:#f2f2f7;font-size:10px;font-weight:700;color:var(--gray);text-transform:uppercase;letter-spacing:.3px}
.dtr{display:grid;grid-template-columns:2fr 1fr 1.2fr 1fr;gap:4px;padding:11px 12px;border-top:1px solid var(--border);font-size:12px;align-items:center}
.empty{text-align:center;padding:40px 20px;color:var(--gray)}
.empty .ico{font-size:38px;margin-bottom:8px}
.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:#1c1c1e;color:#fff;padding:10px 20px;border-radius:20px;font-size:13px;font-weight:500;z-index:400;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap;max-width:90vw}
.toast.show{opacity:1}
.status-bar{background:#f0f9ff;border-radius:10px;padding:8px 12px;font-size:11px;color:#0369a1;margin:0 20px 10px;display:flex;align-items:center;gap:6px}
</style>
</head>
<body>
<div id="app"></div>
<div class="toast" id="toast"></div>

<script>
// ─── CORS Proxy + API ────────────────────────────────────────────────────
const PROXY = 'https://corsproxy.io/?';
const YF_BASE = 'https://query1.finance.yahoo.com';
const YF2_BASE = 'https://query2.finance.yahoo.com';

async function yfFetch(path) {
  const url = PROXY + encodeURIComponent(YF_BASE + path);
  const r = await fetch(url, {headers:{'x-requested-with':'XMLHttpRequest'}});
  if (!r.ok) throw new Error('HTTP ' + r.status);
  return r.json();
}
async function yf2Fetch(path) {
  const url = PROXY + encodeURIComponent(YF2_BASE + path);
  const r = await fetch(url, {headers:{'x-requested-with':'XMLHttpRequest'}});
  if (!r.ok) throw new Error('HTTP ' + r.status);
  return r.json();
}

// Search by name or ISIN → returns array of {symbol, name, exchange, type}
async function searchTicker(query) {
  const j = await yf2Fetch(`/v1/finance/search?q=${encodeURIComponent(query)}&quotesCount=8&newsCount=0&enableFuzzyQuery=true&enableCb=false`);
  return (j?.quotes || [])
    .filter(q => q.symbol && q.quoteType && !['FUTURE','OPTION','CURRENCY'].includes(q.quoteType))
    .map(q => ({
      symbol: q.symbol,
      name: q.shortname || q.longname || q.symbol,
      exchange: q.exchange || q.fullExchangeName || '',
      type: q.typeDisp || q.quoteType || ''
    }));
}

// Fetch live price for a symbol
async function fetchPrice(symbol) {
  const j = await yfFetch(`/v8/finance/chart/${encodeURIComponent(symbol)}?interval=1d&range=1d`);
  const meta = j?.chart?.result?.[0]?.meta;
  if (!meta) throw new Error('No data');
  const price = meta.regularMarketPrice || meta.previousClose;
  const prev = meta.chartPreviousClose || meta.previousClose || price;
  return {
    price,
    change: price - prev,
    changePct: prev > 0 ? ((price - prev) / prev) * 100 : 0,
    currency: meta.currency || '',
    name: meta.shortName || meta.longName || ''
  };
}

// ─── State ───────────────────────────────────────────────────────────────
let S = {investments:[], dividends:[], tab:'portfolio', fCcy:'All', fAcc:'All',
         modal:null, editId:null, txId:null, refreshing:{}, refreshingAll:false,
         acResults:[], acLoading:false, acQuery:'', acTimer:null};
try {
  const d = JSON.parse(localStorage.getItem('it2025') || '{}');
  S.investments = d.i || [];
  S.dividends = d.d || [];
} catch(e) {}

function save() { try { localStorage.setItem('it2025', JSON.stringify({i:S.investments, d:S.dividends})); } catch(e) {} }
function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2); }
function fmt(n, dp=2) { if (n==null||isNaN(n)) return '–'; return Number(n).toLocaleString('en-SG',{minimumFractionDigits:dp,maximumFractionDigits:dp}); }
function fc(n, c, dp=2) {
  const m = {SGD:'S$',USD:'US$',GBP:'£',EUR:'€',HKD:'HK$'};
  const s = m[c] || (c ? c+' ' : '');
  if (n==null||isNaN(n)) return s+'–';
  return (n<0?'-':'') + s + Math.abs(n).toLocaleString('en-SG',{minimumFractionDigits:dp,maximumFractionDigits:dp});
}
function toast(msg, dur=3000) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(t._t); t._t = setTimeout(() => t.classList.remove('show'), dur);
}
function tsAgo(ts) {
  if (!ts) return '';
  const m = Math.round((Date.now()-ts)/60000);
  if (m < 1) return 'just now';
  if (m < 60) return m+'m ago';
  const h = Math.round(m/60);
  return h < 24 ? h+'h ago' : Math.round(h/24)+'d ago';
}

// ─── Price Refresh ───────────────────────────────────────────────────────
async function refreshOne(invId) {
  const inv = S.investments.find(i => i.id === invId);
  if (!inv || !inv.ticker) { toast('⚠️ No ticker set. Search by name first.'); return; }
  S.refreshing[invId] = true; render();
  try {
    const r = await fetchPrice(inv.ticker);
    inv.spotPrice = r.price;
    inv.priceChange = r.change;
    inv.priceChangePct = r.changePct;
    inv.priceUpdated = Date.now();
    inv.priceAuto = true;
    save();
    toast('✅ ' + inv.name + ': ' + fc(r.price, inv.currency, 3));
  } catch(e) {
    toast('⚠️ ' + (inv.ticker||inv.name) + ': fetch failed. Check ticker.');
  }
  S.refreshing[invId] = false; render();
}

async function refreshAll() {
  const list = S.investments.filter(i => i.ticker);
  if (!list.length) { toast('Add investments with tickers first'); return; }
  S.refreshingAll = true; render();
  let ok = 0, fail = 0;
  await Promise.all(list.map(async inv => {
    S.refreshing[inv.id] = true;
    try {
      const r = await fetchPrice(inv.ticker);
      inv.spotPrice = r.price;
      inv.priceChange = r.change;
      inv.priceChangePct = r.changePct;
      inv.priceUpdated = Date.now();
      inv.priceAuto = true;
      ok++;
    } catch(e) { fail++; }
    S.refreshing[inv.id] = false;
  }));
  S.refreshingAll = false;
  save();
  toast('✅ ' + ok + ' updated' + (fail ? ' · ⚠️ ' + fail + ' failed' : ''));
  render();
}

// Auto-refresh every 5 minutes when tab visible
setInterval(() => { if (!document.hidden && S.investments.some(i=>i.ticker)) refreshAll(); }, 5*60*1000);
document.addEventListener('visibilitychange', () => { if (!document.hidden && S.investments.some(i=>i.ticker)) refreshAll(); });

// ─── Autocomplete (search by name) ───────────────────────────────────────
function onNameInput(val) {
  clearTimeout(S.acTimer);
  S.acQuery = val;
  S.acResults = [];
  if (val.length < 2) { S.acLoading = false; renderAC(); return; }
  S.acLoading = true; renderAC();
  S.acTimer = setTimeout(async () => {
    try {
      const results = await searchTicker(val);
      if (S.acQuery === val) {
        S.acResults = results;
        S.acLoading = false;
        renderAC();
      }
    } catch(e) {
      S.acLoading = false;
      renderAC();
    }
  }, 400);
}

function renderAC() {
  const drop = document.getElementById('ac-drop');
  if (!drop) return;
  if (S.acLoading) {
    drop.innerHTML = '<div class="ac-loading"><span class="spin"></span> Searching...</div>';
    drop.style.display = 'block'; return;
  }
  if (!S.acResults.length) { drop.style.display = 'none'; return; }
  drop.innerHTML = S.acResults.map((r,i) =>
    `<div class="ac-item" onclick="pickAC(${i})">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <span class="ac-name">${r.name}</span>
        <span class="ac-sym">${r.symbol}</span>
      </div>
      <span class="ac-ex">${r.exchange} · ${r.type}</span>
    </div>`
  ).join('');
  drop.style.display = 'block';
}

function pickAC(i) {
  const r = S.acResults[i];
  const nameEl = document.getElementById('fn');
  const tkEl = document.getElementById('ftk');
  if (nameEl && !nameEl.value) nameEl.value = r.name;
  if (tkEl) tkEl.value = r.symbol;
  // Auto-detect currency from exchange
  const excCcy = {NMS:'USD',NYQ:'USD',NGM:'USD',LSE:'GBP',SES:'SGD',HKG:'HKD',FRA:'EUR',EPA:'EUR'};
  const ccy = excCcy[r.exchange] || '';
  if (ccy) {
    const ccyEl = document.getElementById('fc2');
    if (ccyEl) ccyEl.value = ccy;
  }
  // Auto-detect market
  const excMkt = {NMS:'NASDAQ',NYQ:'NYSE',NGM:'NASDAQ',LSE:'LSE',SES:'SGX',HKG:'HKEX'};
  const mkt = excMkt[r.exchange] || 'Other';
  const mktEl = document.getElementById('fm');
  if (mktEl) mktEl.value = mkt;

  S.acResults = []; S.acLoading = false;
  const drop = document.getElementById('ac-drop');
  if (drop) drop.style.display = 'none';
}

// ─── Calc ────────────────────────────────────────────────────────────────
function calc(inv) {
  let sh=0, cost=0;
  for (const t of (inv.transactions||[])) {
    const u=+t.shares||0, p=+t.price||0, f=+t.fees||0;
    if (t.type==='Buy')          { cost+=u*p+f; sh+=u; }
    else if (t.type==='Sell')    { const ac=sh>0?cost/sh:0; cost-=u*ac; sh-=u; }
    else if (t.type==='Rights Issue') { cost+=u*p+f; sh+=u; }
    else if (t.type==='Free Issue')   { sh+=u; }
  }
  const avg=sh>0?cost/sh:0, spot=+inv.spotPrice||0, mv=spot*sh, pl=mv-cost, plp=cost>0?(pl/cost)*100:0;
  const yr = new Date().getFullYear().toString();
  const myDivs = S.dividends.filter(d => d.invId===inv.id);
  const dyr  = myDivs.filter(d=>d.date?.startsWith(yr)).reduce((s,d)=>s+(+d.amount||0),0);
  const dtot = myDivs.reduce((s,d)=>s+(+d.amount||0),0);
  const dy = cost>0?(dyr/cost)*100:0;
  return {sh,cost,avg,spot,mv,pl,plp,dyr,dtot,dy};
}

// ─── Render ──────────────────────────────────────────────────────────────
function render() {
  const invs = S.investments.filter(i =>
    (S.fCcy==='All'||i.currency===S.fCcy) && (S.fAcc==='All'||i.account===S.fAcc));
  const all = S.investments.map(i => calc(i));
  const tC=all.reduce((s,x)=>s+x.cost,0), tM=all.reduce((s,x)=>s+x.mv,0),
        tP=tM-tC, tD=all.reduce((s,x)=>s+x.dyr,0);

  document.getElementById('app').innerHTML = `
<div class="header">
  <div style="display:flex;justify-content:space-between;align-items:center">
    <div>
      <h1>📊 InvestTracker</h1>
      <div class="sub">${new Date().toLocaleDateString('en-SG',{weekday:'short',day:'numeric',month:'short',year:'numeric'})}</div>
    </div>
    <button class="btn raf" onclick="refreshAll()" ${S.refreshingAll?'disabled':''}>
      ${S.refreshingAll?'<span class="spin"></span>':'🔄'} ${S.refreshingAll?'Updating...':'Refresh All'}
    </button>
  </div>
  <div class="tabs">
    <button class="tab ${S.tab==='portfolio'?'active':''}" onclick="setTab('portfolio')">Portfolio</button>
    <button class="tab ${S.tab==='dividends'?'active':''}" onclick="setTab('dividends')">Dividends</button>
  </div>
</div>
${S.tab==='portfolio' ? renderPort(invs,tC,tM,tP,tD) : renderDivs()}
${renderModal()}`;

  document.querySelectorAll('.spi').forEach(el => el.addEventListener('change', function() {
    const inv = S.investments.find(i=>i.id===this.dataset.id);
    if (inv) { inv.spotPrice=parseFloat(this.value)||0; inv.priceAuto=false; inv.priceUpdated=Date.now(); save(); render(); }
  }));
}

function renderPort(invs,tC,tM,tP,tD) {
  return `
<div class="summary">
  <div class="scard"><div class="lbl">Total Cost</div><div class="val">${fc(tC,'SGD',0)}</div></div>
  <div class="scard"><div class="lbl">Mkt Value</div><div class="val">${fc(tM,'SGD',0)}</div></div>
  <div class="scard"><div class="lbl">P&L</div><div class="val ${tP>=0?'pos':'neg'}">${tP>=0?'+':''}${fc(tP,'SGD',0)}</div></div>
  <div class="scard"><div class="lbl">Div YTD</div><div class="val pos">${fc(tD,'SGD',0)}</div></div>
</div>
<div class="filter-bar">
  ${['All','SGD','USD','GBP','EUR','HKD'].map(c=>`<button class="chip ${S.fCcy===c?'on':''}" onclick="setF('c','${c}')">${c}</button>`).join('')}
  <span style="width:1px;background:#e5e5ea;flex-shrink:0"></span>
  ${['All','Cash','SRS','CPF'].map(a=>`<button class="chip ${S.fAcc===a?'on':''}" onclick="setF('a','${a}')">${a}</button>`).join('')}
</div>
<div class="section">
  <div class="sec-hdr">
    <span class="sec-ttl">Holdings (${invs.length})</span>
    <button class="btn sm" onclick="openM('addInv')">+ Add</button>
  </div>
  ${invs.length===0?`<div class="empty"><div class="ico">📈</div><div>No investments yet.<br>Tap <b>+ Add</b> to begin.</div></div>`:''}
  ${invs.map(inv=>renderCard(inv)).join('')}
</div>`;}

function renderCard(inv) {
  const s = calc(inv);
  const loading = S.refreshing[inv.id];
  const chg = inv.priceChange||0, chgP = inv.priceChangePct||0;
  const cc = chg>=0?'var(--green)':'var(--red)';
  return `<div class="card">
  <div class="inv-top">
    <div class="inv-meta">
      <div class="inv-name">${inv.name||'Unnamed'}</div>
      <div class="inv-tkr">${inv.ticker?'<b>'+inv.ticker+'</b> · ':''} ${inv.market||'–'} ${inv.isin?'· '+inv.isin:''}</div>
      <div class="badges">
        <span class="badge">${inv.type||'Stock'}</span>
        <span class="badge ${(inv.currency||'').toLowerCase()}">${inv.currency||'–'}</span>
        <span class="badge ${(inv.account||'').toLowerCase()}">${inv.account||'–'}</span>
      </div>
    </div>
    <div class="price-box">
      <div class="price-lbl">
        ${inv.priceAuto&&inv.spotPrice?'<span class="abadge">LIVE</span>':'<span class="mbadge">MANUAL</span>'}
        <button class="btn sm out" style="padding:2px 8px;font-size:10px" onclick="refreshOne('${inv.id}')" ${loading?'disabled':''}>
          ${loading?'<span class="spin"></span>':'🔄'}
        </button>
      </div>
      ${inv.spotPrice
        ? `<div class="price-big">${fc(inv.spotPrice,inv.currency,3)}</div>
           ${inv.priceAuto?`<div class="price-chg" style="color:${cc}">${chg>=0?'+':''}${fc(chg,inv.currency,3)} (${chg>=0?'+':''}${fmt(chgP,2)}%)</div>`:''}
           <div class="price-ts">${tsAgo(inv.priceUpdated)}</div>`
        : `<div style="font-size:11px;color:var(--gray);margin-top:6px">Tap 🔄 to fetch</div>`}
      <div class="manual-row">
        <input class="spot-inp spi" data-id="${inv.id}" type="number" step="0.0001" value="${inv.spotPrice||''}" placeholder="Manual">
      </div>
    </div>
  </div>
  <div class="grid2">
    <div class="stat"><div class="sl">Units Held</div><div class="sv">${fmt(s.sh,4)}</div></div>
    <div class="stat"><div class="sl">Avg Cost</div><div class="sv">${fc(s.avg,inv.currency,4)}</div></div>
    <div class="stat"><div class="sl">Total Cost</div><div class="sv">${fc(s.cost,inv.currency)}</div></div>
    <div class="stat"><div class="sl">Mkt Value</div><div class="sv">${fc(s.mv,inv.currency)}</div></div>
    <div class="stat"><div class="sl">Unreal. P&L</div>
      <div class="sv ${s.pl>=0?'pos':'neg'}">${s.pl>=0?'+':''}${fc(s.pl,inv.currency)}<br>
      <small>${s.pl>=0?'+':''}${fmt(s.plp,2)}%</small></div></div>
    <div class="stat"><div class="sl">Div Yield YTD</div><div class="sv pos">${fmt(s.dy,2)}%</div></div>
    <div class="stat"><div class="sl">Div This Year</div><div class="sv pos">${fc(s.dyr,inv.currency)}</div></div>
    <div class="stat"><div class="sl">Div Cumulative</div><div class="sv pos">${fc(s.dtot,inv.currency)}</div></div>
  </div>
  <div class="actions">
    <button class="btn sm out" onclick="openTx('${inv.id}')">+ Transaction</button>
    <button class="btn sm out" onclick="openDiv('${inv.id}')">+ Dividend</button>
    <button class="btn sm out" onclick="openEdit('${inv.id}')">Edit</button>
    <button class="btn sm red" onclick="delInv('${inv.id}')">Delete</button>
  </div>
  ${renderTxs(inv)}
</div>`;}

function renderTxs(inv) {
  const txs = (inv.transactions||[]).slice().reverse().slice(0,5);
  if (!txs.length) return '';
  return `<div class="tx-hdr">Recent Transactions</div>
  ${txs.map(t=>`<div class="tx-item">
    <div><span class="tx-t ${t.type.toLowerCase().replace(' issue','').replace(' ','')}">${t.type}</span>
    <span style="color:var(--gray);margin-left:6px">${t.date||''}</span></div>
    <div style="text-align:right">
      <div>${fmt(t.shares,4)} units</div>
      ${t.price?`<div style="color:var(--gray);font-size:11px">@ ${fc(t.price,inv.currency,4)}</div>`:''}
    </div>
  </div>`).join('')}`;}

function renderDivs() {
  const divs = S.dividends.slice().sort((a,b)=>(b.date||'').localeCompare(a.date||''));
  const yr = new Date().getFullYear().toString();
  const tot = divs.reduce((s,d)=>s+(+d.amount||0),0);
  const ytd = divs.filter(d=>d.date?.startsWith(yr)).reduce((s,d)=>s+(+d.amount||0),0);
  const byInv = {};
  divs.forEach(d => { if(!byInv[d.invId]) byInv[d.invId]=[]; byInv[d.invId].push(d); });
  return `
<div class="summary">
  <div class="scard"><div class="lbl">All Time</div><div class="val pos">${fc(tot,'SGD')}</div></div>
  <div class="scard"><div class="lbl">YTD ${yr}</div><div class="val pos">${fc(ytd,'SGD')}</div></div>
  <div class="scard"><div class="lbl">Records</div><div class="val">${divs.length}</div></div>
</div>
<div class="section">
  <div class="sec-hdr"><span class="sec-ttl">Dividend Ledger</span>
    <button class="btn sm grn" onclick="openDivG()">+ Add</button>
  </div>
  ${divs.length===0?`<div class="empty"><div class="ico">💰</div><div>No dividends yet.</div></div>`:''}
  ${Object.entries(byInv).map(([id,ds])=>{
    const inv = S.investments.find(i=>i.id===id);
    const nm = inv?.name||'Unknown';
    const t = ds.reduce((s,d)=>s+(+d.amount||0),0);
    return `<div style="margin-bottom:16px">
      <div style="font-size:14px;font-weight:700;display:flex;justify-content:space-between;margin-bottom:6px">
        <span>${nm} <span style="font-size:11px;color:var(--gray);font-weight:500">${inv?.ticker||''}</span></span>
        <span style="color:var(--green)">${fc(t,inv?.currency||'SGD')}</span>
      </div>
      <div class="div-tbl">
        <div class="dthr"><span>Date</span><span>Type</span><span>Amount</span><span>Notes</span></div>
        ${ds.map(d=>`<div class="dtr">
          <span>${d.date||'–'}</span>
          <span style="font-size:10px">${d.divType||'Cash'}</span>
          <span style="font-weight:700;color:var(--green)">${fc(d.amount,inv?.currency||'SGD',4)}</span>
          <span style="color:var(--gray);font-size:10px">${d.notes||''}</span>
        </div>`).join('')}
      </div>
    </div>`;
  }).join('')}
</div>`;}

// ─── Modals ──────────────────────────────────────────────────────────────
function renderModal() {
  if (!S.modal) return '';
  const ov = `class="overlay" onclick="bgClose(event)"`;

  if (S.modal==='addInv'||S.modal==='editInv') {
    const v = S.modal==='editInv' ? S.investments.find(i=>i.id===S.editId) : {};
    const isnew = S.modal==='addInv';
    return `<div ${ov}><div class="modal">
      <h2>${isnew?'Add Investment':'Edit Investment'}</h2>
      <div class="fg">
        <label>Search by Name or ISIN</label>
        <input id="fsearch" placeholder="Type e.g. Vanguard, DBS, AAPL…" oninput="onNameInput(this.value)" autocomplete="off">
        <div id="ac-drop" class="ac-drop" style="display:none"></div>
        <div class="hint">Type to search — tap result to auto-fill ticker, currency & market</div>
      </div>
      <div class="fg"><label>Investment Name *</label>
        <input id="fn" placeholder="e.g. Vanguard FTSE All-World" value="${v?.name||''}">
      </div>
      <div class="row2">
        <div class="fg"><label>Ticker (auto-filled)</label>
          <input id="ftk" placeholder="e.g. VWRA.L" value="${v?.ticker||''}">
        </div>
        <div class="fg"><label>ISIN (optional)</label>
          <input id="fis" placeholder="IE00B3RBWM25" value="${v?.isin||''}">
        </div>
      </div>
      <div class="row2">
        <div class="fg"><label>Type</label>
          <select id="fty">${['ETF','Stock','Unit Trust','Bond'].map(x=>`<option ${v?.type===x?'selected':''}>${x}</option>`).join('')}</select>
        </div>
        <div class="fg"><label>Market (auto-filled)</label>
          <select id="fm">${['SGX','NYSE','NASDAQ','LSE','HKEX','Other'].map(x=>`<option ${v?.market===x?'selected':''}>${x}</option>`).join('')}</select>
        </div>
      </div>
      <div class="row2">
        <div class="fg"><label>Currency (auto-filled)</label>
          <select id="fc2">${['SGD','USD','GBP','EUR','HKD'].map(x=>`<option ${v?.currency===x?'selected':''}>${x}</option>`).join('')}</select>
        </div>
        <div class="fg"><label>Account</label>
          <select id="fa">${['Cash','SRS','CPF'].map(x=>`<option ${v?.account===x?'selected':''}>${x}</option>`).join('')}</select>
        </div>
      </div>
      <div class="fg"><label>Notes</label><input id="fno" placeholder="Optional" value="${v?.notes||''}"></div>
      <div class="m-actions">
        <button class="btn out" onclick="closeM()">Cancel</button>
        <button class="btn" onclick="saveInv()">${isnew?'Add & Fetch Price':'Save'}</button>
      </div>
    </div></div>`;}

  if (S.modal==='addTx') {
    const inv = S.investments.find(i=>i.id===S.txId);
    return `<div ${ov}><div class="modal">
      <h2>Add Transaction</h2>
      <div style="font-size:12px;color:var(--gray);font-weight:600;margin-bottom:14px">${inv?.name||''} (${inv?.currency||''})</div>
      <div class="fg"><label>Type *</label>
        <select id="ftt">${['Buy','Sell','Rights Issue','Free Issue'].map(x=>`<option>${x}</option>`).join('')}</select>
      </div>
      <div class="row2">
        <div class="fg"><label>Date *</label><input id="ftd" type="date" value="${new Date().toISOString().slice(0,10)}"></div>
        <div class="fg"><label>Units *</label><input id="fts" type="number" step="0.0001" placeholder="0.0000"></div>
      </div>
      <div class="row2">
        <div class="fg"><label>Price / Unit</label><input id="ftp" type="number" step="0.0001" placeholder="0.0000"></div>
        <div class="fg"><label>Fees</label><input id="ftf" type="number" step="0.01" placeholder="0.00"></div>
      </div>
      <div class="fg"><label>Notes</label><input id="ftn" placeholder="Optional"></div>
      <div class="m-actions">
        <button class="btn out" onclick="closeM()">Cancel</button>
        <button class="btn" onclick="saveTx()">Add</button>
      </div>
    </div></div>`;}

  if (S.modal==='addDiv') {
    return `<div ${ov}><div class="modal">
      <h2>Add Dividend</h2>
      <div class="fg"><label>Investment *</label>
        <select id="fdi">${S.investments.map(i=>`<option value="${i.id}" ${i.id===S.txId?'selected':''}>${i.name} (${i.ticker||i.currency})</option>`).join('')}</select>
      </div>
      <div class="row2">
        <div class="fg"><label>Date *</label><input id="fdd" type="date" value="${new Date().toISOString().slice(0,10)}"></div>
        <div class="fg"><label>Amount *</label><input id="fda" type="number" step="0.0001" placeholder="0.0000"></div>
      </div>
      <div class="fg"><label>Type</label>
        <select id="fdt">${['Cash','Scrip','Special','Return of Capital'].map(x=>`<option>${x}</option>`).join('')}</select>
      </div>
      <div class="fg"><label>Notes</label><input id="fdn" placeholder="e.g. Q1 2025"></div>
      <div class="m-actions">
        <button class="btn out" onclick="closeM()">Cancel</button>
        <button class="btn grn" onclick="saveDiv()">Add</button>
      </div>
    </div></div>`;}
  return '';}

// ─── Actions ─────────────────────────────────────────────────────────────
function setTab(t) { S.tab=t; render(); }
function setF(k,v) { if(k==='c') S.fCcy=v; else S.fAcc=v; render(); }
function openM(m) { S.modal=m; S.editId=null; S.acResults=[]; render(); }
function openEdit(id) { S.modal='editInv'; S.editId=id; S.acResults=[]; render(); }
function openTx(id) { S.modal='addTx'; S.txId=id; render(); }
function openDiv(id) { S.modal='addDiv'; S.txId=id; render(); }
function openDivG() { S.modal='addDiv'; S.txId=S.investments[0]?.id||null; render(); }
function closeM() { S.modal=null; S.editId=null; S.txId=null; S.acResults=[]; S.acLoading=false; render(); }
function bgClose(e) { if(e.target.classList.contains('overlay')) closeM(); }

function saveInv() {
  const name = document.getElementById('fn').value.trim();
  if (!name) { alert('Investment name is required.'); return; }
  const ticker = document.getElementById('ftk').value.trim();
  if (S.modal==='addInv') {
    const newInv = {
      id:uid(), name, ticker,
      isin: document.getElementById('fis').value.trim(),
      type: document.getElementById('fty').value,
      market: document.getElementById('fm').value,
      currency: document.getElementById('fc2').value,
      account: document.getElementById('fa').value,
      notes: document.getElementById('fno').value.trim(),
      spotPrice:0, transactions:[]
    };
    S.investments.push(newInv);
    save(); closeM();
    if (ticker) { setTimeout(() => refreshOne(newInv.id), 300); }
  } else {
    const inv = S.investments.find(i=>i.id===S.editId);
    if (inv) {
      Object.assign(inv, {name, ticker,
        isin: document.getElementById('fis').value.trim(),
        type: document.getElementById('fty').value,
        market: document.getElementById('fm').value,
        currency: document.getElementById('fc2').value,
        account: document.getElementById('fa').value,
        notes: document.getElementById('fno').value.trim()
      });
    }
    save(); closeM();
    if (ticker) setTimeout(() => refreshOne(inv.id), 300);
  }
}

function saveTx() {
  const sh = parseFloat(document.getElementById('fts').value);
  if (!sh||sh<=0) { alert('Enter valid units.'); return; }
  const inv = S.investments.find(i=>i.id===S.txId); if(!inv) return;
  if (!inv.transactions) inv.transactions=[];
  inv.transactions.push({id:uid(), type:document.getElementById('ftt').value,
    date:document.getElementById('ftd').value, shares:sh,
    price:parseFloat(document.getElementById('ftp').value)||0,
    fees:parseFloat(document.getElementById('ftf').value)||0,
    notes:document.getElementById('ftn').value.trim()});
  save(); closeM();
}

function saveDiv() {
  const amt = parseFloat(document.getElementById('fda').value);
  if (!amt||amt<=0) { alert('Enter valid amount.'); return; }
  S.dividends.push({id:uid(), invId:document.getElementById('fdi').value,
    date:document.getElementById('fdd').value, amount:amt,
    divType:document.getElementById('fdt').value,
    notes:document.getElementById('fdn').value.trim()});
  save(); closeM();
}

function delInv(id) {
  if (!confirm('Delete this investment and all its data?')) return;
  S.investments = S.investments.filter(i=>i.id!==id);
  S.dividends = S.dividends.filter(d=>d.invId!==id);
  save(); render();
}

// ─── Boot ────────────────────────────────────────────────────────────────
render();
// Auto-refresh prices on load
if (S.investments.some(i=>i.ticker)) {
  setTimeout(refreshAll, 1000);
}
</script>
</body>
</html>
